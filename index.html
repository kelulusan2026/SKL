<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Kelulusan 2026 - SMKN 1 Semparuk</title>
    <!-- Library untuk efek konfeti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --primary: #00f2fe; 
            --secondary: #4facfe; 
            --dark: #0d0e14; 
            --success: #2ecc71;
            --error: #ff4757;
        }
        
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--dark); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .container { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            padding: 3rem; 
            border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { 
            background: linear-gradient(to right, var(--primary), var(--secondary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-size: 3rem; 
            margin: 0; 
            font-weight: 800;
        }

        p.subtitle { opacity: 0.7; margin-bottom: 2rem; font-size: 0.9rem; letter-spacing: 1px; }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0 25px 0; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(0,0,0,0.3); 
            color: white; 
            font-size: 1.2rem; 
            text-align: center; 
            outline: none; 
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }

        button { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: none; 
            background: linear-gradient(45deg, var(--secondary), var(--primary)); 
            color: #000; 
            font-weight: bold; 
            font-size: 1rem;
            cursor: pointer; 
            transition: 0.4s; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(79, 172, 254, 0.4); }
        button:active { transform: translateY(0); }

        #result { 
            margin-top: 2rem; 
            display: none; 
            padding: 20px; 
            border-radius: 15px; 
            background: rgba(255,255,255,0.07); 
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-download { 
            display: inline-block; 
            margin-top: 20px; 
            padding: 12px 30px; 
            background: var(--success); 
            color: white; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold; 
            transition: 0.3s;
        }

        .btn-download:hover { background: #27ae60; transform: scale(1.05); }

        .footer-note { font-size: 0.7rem; opacity: 0.4; margin-top: 2rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>2026</h1>
        <p class="subtitle">Portal Kelulusan SMKN 1 Semparuk</p>
        
        <input type="number" id="nisnInput" placeholder="Masukkan NISN..." pattern="\d*">
        <button onclick="cekStatus()">CEK KELULUSAN</button>

        <div id="result">
            <div id="statusMsg"></div>
            <div id="downloadArea"></div>
        </div>

        <p class="footer-note">© 2026 SMKN 1 Semparuk - Tim IT PPLG</p>
    </div>

    <script>
        // 1. DAFTAR BLACKLIST (NISN YANG DITANGGUHKAN)
        // Masukkan NISN yang tidak lulus di sini agar tombol unduh tidak muncul
        const daftarTidakLulus = [
            "0076372612", "0065736875", "0069244360", "0081064769", "0065373754",
            "0088122839", "0075031441", "0061383661", "0085543500", "0086366856"
        ];

        async function cekStatus() {
            const input = document.getElementById('nisnInput').value.trim();
            const resBox = document.getElementById('result');
            const msg = document.getElementById('statusMsg');
            const dl = document.getElementById('downloadArea');

            if (!input) {
                alert("Silakan masukkan NISN terlebih dahulu!");
                return;
            }

            resBox.style.display = "block";
            msg.innerHTML = "Memproses data...";
            dl.innerHTML = "";

            // A. CEK APAKAH ADA DI DAFTAR TIDAK LULUS
           if (daftarTidakLulus.includes(input)) {
    msg.innerHTML = `<h2 style="color:var(--error)">PENGUMUMAN</h2>
                     <p>Untuk saat ini, status kelulusan Anda <b>belum dapat ditampilkan</b> secara mandiri.</p>
                     <p>Mohon kesediaan Anda untuk <b>menghubungi Wali Kelas</b> atau datang ke sekolah guna mendapatkan informasi lebih lanjut.</p>`;
    return;
}

            try {
                // B. AMBIL DATABASE DARI DAFTAR.TXT
                // Tambahkan parameter unik (?t=) agar browser tidak mengambil cache lama
                const response = await fetch('daftar.txt?t=' + new Date().getTime());
                
                if (!response.ok) throw new Error("File daftar.txt tidak ditemukan");
                
                const data = await response.text();
                
                // C. BERSIHKAN DATA (Menangani karakter \r dari Windows dan baris kosong)
                const listFile = data.split(/\r?\n/).map(f => f.trim()).filter(f => f !== "");

                // D. CARI FILE DENGAN LOGIKA STARTSWITH
                const fileKetemu = listFile.find(namaFile => namaFile.startsWith(input));

                if (fileKetemu) {
                    // EFEK SELEBRASI
                    confetti({ 
                        particleCount: 150, 
                        spread: 70, 
                        origin: { y: 0.6 },
                        colors: ['#00f2fe', '#4facfe', '#2ecc71']
                    });
                    
                    // EKSTRAK NAMA (Menghapus NISN dan ekstensi .pdf dari tampilan nama)
                    const namaSiswa = fileKetemu.replace(input, "").replace(/\.[^/.]+$/, "").trim();

                    msg.innerHTML = `<h2 style="color:var(--success)">SELAMAT!</h2>
                                     <p>Nama: <b>${namaSiswa || 'Siswa'}</b></p>
                                     <p>Anda dinyatakan: <b style="color:var(--success)">LULUS</b></p>`;
                    
                    // DOWNLOAD LINK (Menggunakan encodeURIComponent agar nama file berspasi tetap bisa dibuka)
                    dl.innerHTML = `<a href="SKL 2026/${encodeURIComponent(fileKetemu)}" class="btn-download" download>UNDUH SKL (PDF)</a>`;
                } else {
                    msg.innerHTML = `<h2 style="color:#f1c40f">DATA TIDAK ADA</h2>
                                     <p>NISN <b>${input}</b> tidak ditemukan dalam database.<br>Pastikan nomor benar atau hubungi Admin Sekolah.</p>`;
                }
            } catch (error) {
                console.error(error);
                msg.innerHTML = `<p style="color:var(--error)">Gagal memuat database.<br>Pastikan Anda sedang online dan file tersedia.</p>`;
            }
        }
    </script>
</body>
</html>
