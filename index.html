<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Kelulusan 2026 - SMKN 1 Semparuk</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00f2fe; 
            --secondary: #4facfe; 
            --dark: #050508; 
            --glass: rgba(255, 255, 255, 0.07);
            --success: #2ecc71;
            --error: #ff4757;
        }
        
        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            background: var(--dark);
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        /* --- BACKGROUND LANGIT BINTANG --- */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        .shooting-star {
            position: absolute;
            top: 50%; left: 50%;
            width: 4px; height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 0 20px rgba(255,255,255,1);
            animation: animate-star 3s linear infinite;
        }

        .shooting-star::before {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            height: 1px;
            background: linear-gradient(90deg, #fff, transparent);
        }

        @keyframes animate-star {
            0% { transform: rotate(315deg) translateX(0); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: rotate(315deg) translateX(-1000px); opacity: 0; }
        }

        /* --- ASTRONOT --- */
        .astronaut {
    position: absolute;
    width: 140px; 
    filter: drop-shadow(0 0 25px rgba(0, 242, 254, 0.4));
    /* Menggunakan cubic-bezier agar gerakan melambat di ujung dan cepat di tengah */
    animation: orbitSmooth 25s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    pointer-events: none;
    user-select: none;
    z-index: 1;
}

@keyframes orbitSmooth {
    0% { 
        transform: translate(-50%, -50%) rotate(0deg) translateX(220px) rotate(0deg) scale(0.8);
        z-index: 1;
        opacity: 0.6;
        filter: blur(2px) brightness(0.7);
    }
    /* Saat di samping, mulai transisi ke depan */
    25% {
        z-index: 1;
    }
    49% {
        z-index: 1;
    }
    /* TITIK BALIK: Saat di depan container */
    50% { 
        transform: translate(-50%, -50%) rotate(180deg) translateX(220px) rotate(-180deg) scale(1.3);
        z-index: 20; 
        opacity: 1;
        filter: blur(0px) brightness(1.2);
    }
    51% {
        z-index: 20;
    }
    75% {
        z-index: 20;
    }
    100% { 
        transform: translate(-50%, -50%) rotate(360deg) translateX(220px) rotate(-360deg) scale(0.8);
        z-index: 1;
        opacity: 0.6;
        filter: blur(2px) brightness(0.7);
    }
}
        /* --- CONTAINER UTAMA --- */
        .container { 
            background: var(--glass);
            backdrop-filter: blur(25px); 
            padding: 3rem 2.5rem; 
            border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
            z-index: 10;
        }

        .logo-sekolah { width: 90px; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--primary)); }
        h1 { background: linear-gradient(to bottom, #fff, var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 4rem; margin: 0; font-weight: 900; letter-spacing: -3px; }
        .subtitle { font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 2.5rem; color: var(--secondary); font-weight: 600; }

        /* --- COUNTDOWN --- */
        .countdown-container {
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 20px;
            border: 1px dashed var(--primary);
        }
        .timer { display: flex; justify-content: space-around; gap: 10px; }
        .time-box { display: flex; flex-direction: column; }
        .time-box span:first-child { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .time-box span:last-child { font-size: 0.6rem; text-transform: uppercase; opacity: 0.6; }
        .lock-msg { color: var(--error); font-size: 0.8rem; margin-top: 15px; font-weight: 600; letter-spacing: 1px; }

        /* --- FORM & INPUT --- */
        #inputArea { display: none; }
        input { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; font-size: 1.1rem; text-align: center; outline: none; transition: 0.4s; margin-bottom: 15px; box-sizing: border-box; }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.1); box-shadow: 0 0 30px rgba(0, 242, 254, 0.15); }
        button { width: 100%; padding: 18px; border-radius: 20px; border: none; background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%); color: #050508; font-weight: 800; cursor: pointer; transition: 0.5s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 20px 40px rgba(79, 172, 254, 0.4); }

        #result { margin-top: 2rem; display: none; padding: 25px; border-radius: 25px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); }
        .btn-download { display: inline-block; margin-top: 20px; padding: 15px 30px; background: var(--success); color: white; text-decoration: none; border-radius: 15px; font-weight: 700; box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3); }
        #loader { display: none; width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #loader-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.5s ease; }
        .footer-note { font-size: 0.7rem; opacity: 0.4; margin-top: 3rem; }

        /* --- INDIKATOR AUDIO --- */
        #audioStatus {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            font-size: 0.7rem;
            color: var(--primary);
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <!-- Audio Element -->
    <audio id="bgMusic" loop>
        <source src="interstellar.mp3" type="audio/mpeg">
    </audio>


    <div class="stars-container" id="starField"></div>

   <!-- GANTI SVG TADI DENGAN KODE INI -->
<img src="astronot.png" 
     alt="Cinematic Astronaut" 
     class="astronaut">

    <div class="container animate__animated animate__zoomIn">
        <img src="logo.png" alt="Logo" class="logo-sekolah">
        <h1>2026</h1>
        <p class="subtitle">Portal Kelulusan</p>

        <!-- AREA COUNTDOWN -->
        <div id="countdownArea" class="countdown-container">
            <div class="timer">
                <div class="time-box"><span id="days">00</span><span>Hari</span></div>
                <div class="time-box"><span id="hours">00</span><span>Jam</span></div>
                <div class="time-box"><span id="minutes">00</span><span>Menit</span></div>
                <div class="time-box"><span id="seconds">00</span><span>Detik</span></div>
            </div>
            <p class="lock-msg">AKSES DIBUKA 4 MEI 2026 - 07:00 WIB</p>
        </div>

        <!-- AREA INPUT -->
        <div id="inputArea">
            <input type="number" id="nisnInput" placeholder="Ketik NISN Kamu..." pattern="\d*">
            <button onclick="cekStatus()" id="btnCek">Buka Masa Depan</button>
        </div>

        <div id="loader"><div id="loader-bar"></div></div>
        <div id="result">
            <div id="statusMsg"></div>
            <div id="downloadArea"></div>
        </div>
        <p class="footer-note">Dibuat with ❤️ by Tim IT RPL • SMKN 1 Semparuk</p>
    </div>

    <script>
        // --- LOGIKA CINEMATIC AUDIO (AUTO-TRIGGER) ---
        const audio = document.getElementById('bgMusic');
        let audioStarted = false;

        function playAudio() {
    if (!audioStarted) {
        // Kita mulai dari 0.3 agar suara langsung terdengar jelas saat pertama jalan
        audio.volume = 0.3; 
        audio.play().then(() => {
            audioStarted = true;
            
            let vol = 0.3;
            const fade = setInterval(() => {
                // Target maksimal adalah 1.0 (Volume 100%)
                if (vol < 1.0) {
                    vol += 0.05;
                    // Pastikan volume tidak sengaja melebihi 1.0
                    audio.volume = Math.min(vol, 1.0);
                } else {
                    clearInterval(fade);
                }
            }, 100);

            document.getElementById('audioStatus').innerText = "🔊 AUDIO ACTIVE";
            document.removeEventListener('mousemove', playAudio);
            document.removeEventListener('touchstart', playAudio);
        }).catch(err => {
            console.log("Menunggu interaksi...");
        });
    }
}

        // Trigger saat mouse digerakkan atau layar disentuh
        document.addEventListener('mousemove', playAudio);
        document.addEventListener('touchstart', playAudio);


        // --- ANIMASI BINTANG ---
        const field = document.getElementById('starField');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            field.appendChild(star);
        }

        function createShootingStar() {
            const sStar = document.createElement('div');
            sStar.className = 'shooting-star';
            sStar.style.top = Math.random() * 50 + '%';
            sStar.style.left = Math.random() * 100 + '%';
            sStar.style.animationDuration = Math.random() * 2 + 2 + 's';
            field.appendChild(sStar);
            setTimeout(() => { sStar.remove(); }, 4000);
        }
        setInterval(createShootingStar, 2000);

        // --- LOGIKA COUNTDOWN ---
        const targetDate = new Date('May 4, 2026 07:00:00').getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const inputArea = document.getElementById('inputArea');
            const countdownArea = document.getElementById('countdownArea');

            if (distance < 0) {
                inputArea.style.display = "block";
                countdownArea.style.display = "none";
                return;
            }

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // --- LOGIKA CEK STATUS ---
        const daftarTidakLulus = ["0076372612", "0065736875", "0069244360", "0081064769", "0065373754", "0088122839", "0075031441", "0061383661", "0085543500", "0086366856"];

        async function cekStatus() {
            playAudio(); // Pastikan audio jalan saat interaksi utama

            const input = document.getElementById('nisnInput').value.trim();
            const resBox = document.getElementById('result');
            const msg = document.getElementById('statusMsg');
            const dl = document.getElementById('downloadArea');
            const loader = document.getElementById('loader');
            const lBar = document.getElementById('loader-bar');
            const btn = document.getElementById('btnCek');

            if (!input) { alert("NISN tidak boleh kosong!"); return; }

            btn.disabled = true;
            btn.innerText = "Menganalisa...";
            resBox.style.display = "none";
            loader.style.display = "block";
            lBar.style.width = "0%";
            
            setTimeout(() => { lBar.style.width = "70%"; }, 200);

            try {
                const response = await fetch('daftar.txt?t=' + new Date().getTime());
                const data = await response.text();
                const listFile = data.split(/\r?\n/).map(f => f.trim()).filter(f => f !== "");
                
                lBar.style.width = "100%";

                setTimeout(() => {
                    loader.style.display = "none";
                    btn.disabled = false;
                    btn.innerText = "Buka Masa Depan";
                    resBox.style.display = "block";
                    resBox.className = "animate__animated animate__backInUp";

                    if (daftarTidakLulus.includes(input)) {
                        msg.innerHTML = `<h2 style="color:var(--error)">PEMBERITAHUAN</h2><p>Silakan hubungi Sekolah atau Wali Kelas untuk informasi kelulusan Anda.</p>`;
                        dl.innerHTML = "";
                        return;
                    }

                    const fileKetemu = listFile.find(f => f.startsWith(input));

                    if (fileKetemu) {
                        confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
                        const nama = fileKetemu.replace(input, "").replace(/\.[^/.]+$/, "").trim();
                        msg.innerHTML = `
                            <h2 style="color:var(--primary)">SELAMAT!</h2>
                            <p style="font-size:1.3rem; font-weight:700;">${nama}</p>
                            <p style="opacity:0.7">Perjalanan baru dimulai. Kamu resmi menjadi Alumni SMKN 1 Semparuk!</p>`;
                        dl.innerHTML = `<a href="SKL 2026/${encodeURIComponent(fileKetemu)}" class="btn-download" download>Download SKL (PDF)</a>`;
                    } else {
                        msg.innerHTML = `<h2>UPS!</h2><p>NISN tidak ditemukan di database. Pastikan input sudah benar ya.</p>`;
                        dl.innerHTML = "";
                    }
                }, 1000);
            } catch (e) {
                alert("Gagal memuat database! Hubungi Tim IT.");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
