<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Kelulusan 2026 - SMKN 1 Semparuk</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { 
            --primary: #00f2fe; 
            --secondary: #4facfe; 
            --dark: #08090d; 
            --glass: rgba(255, 255, 255, 0.1);
            --success: #2ecc71;
            --error: #ff4757;
            --warning: #f1c40f;
        }
        
        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            background: radial-gradient(circle at center, #1a1c2c 0%, var(--dark) 100%);
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow: hidden;
        }

        /* Background blur animasi */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--secondary);
            filter: blur(150px);
            border-radius: 50%;
            z-index: -1;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(-50%, -50%); }
            100% { transform: translate(50%, 50%); }
        }

        .container { 
            background: var(--glass);
            backdrop-filter: blur(20px); 
            padding: 2.5rem; 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.15); 
            width: 90%; 
            max-width: 420px; 
            text-align: center; 
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
        }

        /* CSS UNTUK LOGO */
        .logo-sekolah {
            width: 100px; /* Ukuran logo */
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        h1 { 
            background: linear-gradient(to right, var(--primary), var(--secondary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-size: 3.5rem; 
            margin: 0; 
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
        }

        .subtitle { opacity: 0.8; margin-bottom: 2rem; font-size: 0.85rem; font-weight: 400; text-transform: uppercase; letter-spacing: 2px; }

        input { 
            width: 100%; 
            padding: 16px; 
            border-radius: 16px; 
            border: 2px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.2); 
            color: white; 
            font-size: 1.2rem; 
            text-align: center; 
            outline: none; 
            box-sizing: border-box;
            transition: 0.4s;
        }

        input:focus { border-color: var(--primary); background: rgba(0,0,0,0.4); box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); }

        button { 
            width: 100%; 
            padding: 16px; 
            margin-top: 20px;
            border-radius: 16px; 
            border: none; 
            background: linear-gradient(45deg, var(--secondary), var(--primary)); 
            color: #000; 
            font-weight: 800; 
            font-size: 1rem;
            cursor: pointer; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-transform: uppercase;
        }

        button:hover { transform: scale(1.02); box-shadow: 0 15px 30px rgba(79, 172, 254, 0.4); }

        #loader {
            display: none;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        #loader-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.5s ease; }

        #result { margin-top: 1.5rem; display: none; padding: 25px; border-radius: 20px; background: rgba(255,255,255,0.05); }

        .btn-download { 
            display: inline-block; 
            margin-top: 20px; 
            padding: 14px 35px; 
            background: var(--success); 
            color: white; 
            text-decoration: none; 
            border-radius: 14px; 
            font-weight: 700; 
            transition: 0.3s;
        }

        .footer-note { font-size: 0.75rem; opacity: 0.5; margin-top: 2.5rem; }
    </style>
</head>
<body>

    <div class="container animate__animated animate__fadeInDown">
        <!-- PASTIKAN NAMA FILE LOGO SESUAI (misal: logo.png) -->
        <img src="logo.png" alt="Logo SMKN 1 Semparuk" class="logo-sekolah">
        
        <h1>2026</h1>
        <p class="subtitle">Kelulusan SMKN 1 Semparuk</p>
        
        <input type="number" id="nisnInput" placeholder="Masukkan NISN Anda..." pattern="\d*">
        <button onclick="cekStatus()" id="btnCek">Cek Kelulusan</button>

        <div id="loader"><div id="loader-bar"></div></div>

        <div id="result" class="animate__animated">
            <div id="statusMsg"></div>
            <div id="downloadArea"></div>
        </div>

        <p class="footer-note">© 2026 Tim IT PPLG • SMKN 1 Semparuk</p>
    </div>

    <script>
        const daftarTidakLulus = [
            "0076372612", "0065736875", "0069244360", "0081064769", "0065373754",
            "0088122839", "0075031441", "0061383661", "0085543500", "0086366856"
        ];

        async function cekStatus() {
            const input = document.getElementById('nisnInput').value.trim();
            const resBox = document.getElementById('result');
            const msg = document.getElementById('statusMsg');
            const dl = document.getElementById('downloadArea');
            const loader = document.getElementById('loader');
            const lBar = document.getElementById('loader-bar');
            const btn = document.getElementById('btnCek');

            if (!input) { alert("Harap masukkan NISN!"); return; }

            btn.disabled = true;
            btn.innerText = "Mencari...";
            resBox.style.display = "none";
            loader.style.display = "block";
            lBar.style.width = "0%";
            
            setTimeout(() => { lBar.style.width = "60%"; }, 100);

            try {
                const response = await fetch('daftar.txt?t=' + new Date().getTime());
                if (!response.ok) throw new Error();
                const data = await response.text();
                const listFile = data.split(/\r?\n/).map(f => f.trim()).filter(f => f !== "");
                
                lBar.style.width = "100%";

                setTimeout(() => {
                    loader.style.display = "none";
                    btn.disabled = false;
                    btn.innerText = "Cek Kelulusan";
                    resBox.style.display = "block";
                    resBox.className = "animate__animated animate__zoomIn";

                    if (daftarTidakLulus.includes(input)) {
                        msg.innerHTML = `
                            <h2 style="color:var(--error)">PEMBERITAHUAN</h2>
                            <p style="font-size: 0.9rem; line-height: 1.6;">
                                Mohon maaf, status kelulusan Anda <b>belum dapat ditampilkan</b> secara mandiri.<br><br>
                                Silakan hubungi <b>Wali Kelas</b> Anda untuk informasi lebih lanjut.
                            </p>`;
                        dl.innerHTML = "";
                        return;
                    }

                    const fileKetemu = listFile.find(namaFile => namaFile.startsWith(input));

                    if (fileKetemu) {
                        confetti({ 
                            particleCount: 180, spread: 80, origin: { y: 0.6 },
                            colors: ['#00f2fe', '#4facfe', '#2ecc71', '#ffffff']
                        });
                        
                        const namaSiswa = fileKetemu.replace(input, "").replace(/\.[^/.]+$/, "").trim();

                        msg.innerHTML = `
                            <h2 style="color:var(--success); margin-bottom:5px;">SELAMAT!</h2>
                            <p style="margin-top:0; opacity:0.8;">Status: <b>LULUS</b></p>
                            <p style="font-size: 1.2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top:15px; font-weight:bold;">
                                ${namaSiswa || 'Siswa'}
                            </p>`;
                        
                        dl.innerHTML = `<a href="SKL 2026/${encodeURIComponent(fileKetemu)}" class="btn-download" download>Unduh SKL (PDF)</a>`;
                    } else {
                        msg.innerHTML = `
                            <h2 style="color:var(--warning)">TIDAK DITEMUKAN</h2>
                            <p>NISN <b>${input}</b> tidak terdaftar.<br>Cek kembali nomor Anda atau hubungi Admin.</p>`;
                        dl.innerHTML = "";
                    }
                }, 800);

            } catch (error) {
                loader.style.display = "none";
                btn.disabled = false;
                btn.innerText = "Coba Lagi";
                resBox.style.display = "block";
                msg.innerHTML = "<p style='color:var(--error)'>Database tidak ditemukan atau Anda sedang offline.</p>";
            }
        }
    </script>
</body>
</html>
