<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Kelulusan 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --dark: #0d0e14; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 3rem; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px; text-align: center; }
        h1 { background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.5rem; margin: 0; }
        input { width: 100%; padding: 15px; margin: 25px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-size: 1.1rem; text-align: center; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(45deg, var(--secondary), var(--primary)); color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #result { margin-top: 2rem; display: none; padding: 20px; border-radius: 15px; background: rgba(255,255,255,0.05); }
        .btn-download { display: inline-block; margin-top: 15px; padding: 12px 25px; background: #2ecc71; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>2026</h1>
        <p style="opacity: 0.6;">Portal Kelulusan SMKN 1 Semparuk</p>
        
        <input type="number" id="nisnInput" placeholder="Masukkan NISN Anda..." maxlength="10">
        <button onclick="cekStatus()">CEK KELULUSAN</button>

        <div id="result">
            <div id="statusMsg"></div>
            <div id="downloadArea"></div>
        </div>
    </div>

    <script>
        // 1. HANYA TANDAI YANG TIDAK LULUS DI SINI
        const daftarTidakLulus = [
            "0076372612", "0065736875", "0069244360", "0081064769", "0065373754",
            "0088122839", "0075031441", "0061383661", "0085543500", "0086366856"
        ];

        async function cekStatus() {
            const input = document.getElementById('nisnInput').value.trim();
            const resBox = document.getElementById('result');
            const msg = document.getElementById('statusMsg');
            const dl = document.getElementById('downloadArea');

            if (!input) return;
            resBox.style.display = "block";

            // A. LOGIKA BLACKLIST (CEK TIDAK LULUS)
            if (daftarTidakLulus.includes(input)) {
                msg.innerHTML = `<h2 style="color:#ff4757">TIDAK LULUS</h2>
                                 <p>Mohon maaf, silakan hubungi Wali Kelas Anda untuk informasi lebih lanjut.</p>`;
                dl.innerHTML = "";
                return;
            }

            // B. LOGIKA STARTSWITH (MENCARI FILE PDF DI SERVER)
            // Karena GitHub Pages tidak mendukung pencarian folder secara native, 
            // kita gunakan trik membaca daftar file dari 'index' folder jika diizinkan server,
            // atau mencoba mencocokkan input dengan file yang ada.
            
            try {
                // Kita memanggil file 'daftar.txt' yang berisi hasil 'dir /b' Bapak
                // Ini satu-satunya cara agar script bisa menggunakan logika .startsWith() 
                // tanpa harus menuliskan semua nama di dalam file HTML ini.
                const response = await fetch('daftar.txt');
                const data = await response.text();
                const listFile = data.split('\n').map(f => f.trim());

                // Logika Utama: Cari file yang diawali (startsWith) dengan NISN
                const fileKetemu = listFile.find(namaFile => namaFile.startsWith(input));

                if (fileKetemu) {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    
                    // Ekstrak nama siswa dari nama file
                    const namaSiswa = fileKetemu.replace(input, "").replace(".pdf", "").trim();

                    msg.innerHTML = `<h2 style="color:#2ecc71">SELAMAT!</h2>
                                     <p>Nama: <b>${namaSiswa}</b></p>
                                     <p>Anda dinyatakan: <b style="color:#2ecc71">LULUS</b></p>`;
                    
                    dl.innerHTML = `<a href="SKL 2026/${encodeURIComponent(fileKetemu)}" class="btn-download" download>UNDUH SKL (PDF)</a>`;
                } else {
                    msg.innerHTML = `<h2 style="color:#f1c40f">DATA TIDAK ADA</h2>
                                     <p>NISN <b>${input}</b> tidak ditemukan. <br>Pastikan nomor yang dimasukkan benar.</p>`;
                    dl.innerHTML = "";
                }
            } catch (error) {
                msg.innerHTML = "Gagal memuat data. Pastikan file daftar.txt sudah ada.";
            }
        }
    </script>
</body>
</html>
